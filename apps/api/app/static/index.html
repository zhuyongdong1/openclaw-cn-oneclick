<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw CN OneClick</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="top">
        <div class="brand">OpenClaw CN OneClick</div>
        <div class="muted">Local Admin UI</div>
      </header>

      <section class="card">
        <h2>Status</h2>
        <div class="row">
          <button id="btn-health">Check health</button>
          <code id="health-out" class="code">(not checked)</code>
        </div>
      </section>

      <section class="card">
        <h2>Login</h2>
        <div class="grid">
          <label>
            <span>Email</span>
            <input id="email" placeholder="admin@local" autocomplete="username" />
          </label>
          <label>
            <span>Password</span>
            <input id="password" type="password" placeholder="(from install output)" autocomplete="current-password" />
          </label>
        </div>
        <div class="row">
          <button id="btn-login">Get token</button>
          <button id="btn-logout" class="secondary">Clear token</button>
        </div>
        <div class="row">
          <span class="muted">Token:</span>
          <code id="token" class="code">(none)</code>
        </div>
      </section>

      <section class="card">
        <h2>Audit Logs</h2>
        <div class="row">
          <button id="btn-audit">Refresh</button>
          <span class="muted">Requires token</span>
        </div>
        <div id="audit" class="audit"></div>
      </section>

      <footer class="foot muted">
        API docs: <a href="/docs" target="_blank" rel="noreferrer">/docs</a>
      </footer>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
